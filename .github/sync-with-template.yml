$schema: https://raw.githubusercontent.com/remal-github-actions/sync-with-template/main/config.schema.json
includes:
- .agents/rules/**
- .claude/rules/**
- .github/**
- .mergify/*
- .gitattributes
- .gitignore
- .editorconfig
- retry-connection-timeouts
- "*-retry-connection-timeouts"
- retry-connection-timeouts-*
- checkstyle.xml
- lombok.config
- eslint.config.*
- .eslint*
- .prettier*
- .yarn*
- check-dependency-engines.*js
- update-node-version-in-files.*js
- tsconfig-generate-app.*js
- .releaseignore
excludes:
- .github/workflows/*template*-cleanup.*
- .github/*template*-cleanup/**
- .github/workflows/release-drafter.yml
- .github/release-drafter.yml
modifiable-sections-exclusions:
- .yarn/plugins/**
- .yarn/releases/**
